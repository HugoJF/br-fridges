    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#111;font-size:13px;background:#fff}
    .wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
    h1{font-size:1.1rem;font-weight:600;margin-bottom:0.2rem}
    .subtitle{font-size:12px;color:#666;margin-bottom:1.25rem}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0.75rem}
    .filters select,.filters input{font-size:12px;padding:5px 9px;border:0.5px solid #d9d9d9;border-radius:6px;background:#fff;color:#111}
    .filters input{flex:1;min-width:120px}
    .meta{font-size:11px;color:#666;margin-bottom:8px}
    .tbl-wrap{overflow-x:auto;border:0.5px solid #ebebeb;border-radius:10px}
    table{width:100%;border-collapse:collapse;min-width:960px}
    thead th{background:#f6f6f6;font-weight:500;font-size:11px;color:#666;padding:7px 9px;text-align:left;border-bottom:0.5px solid #ebebeb;white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{color:#111}
    tbody tr{border-bottom:0.5px solid #ebebeb}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f6f6f6}
    td{padding:7px 9px;vertical-align:middle}
    td.r{text-align:right;font-variant-numeric:tabular-nums}
    td.c{text-align:center}
    .bm{font-weight:500}
    .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;white-space:nowrap}
    .d{background:#E6F1FB;color:#185FA5;border:0.5px solid #B5D4F4}
    .i{background:#EAF3DE;color:#3B6D11;border:0.5px solid #C0DD97}
    .s{background:#FAEEDA;color:#854F0B;border:0.5px solid #FAC775}
    .f{background:#FBEAF0;color:#993556;border:0.5px solid #F4C0D1}
    .c2{background:#F1EFE8;color:#5F5E5A;border:0.5px solid #D3D1C7}
    .yes{color:#3B6D11;font-weight:500}
    .no{color:#aaa}
    .unk{color:#ccc}
    .price{font-weight:500;white-space:nowrap}
  </style>

    <input id="fs" type="text" placeholder="Buscar modelo...">

  <div class="meta" id="ct"></div>
  <div class="tbl-wrap">

        <th data-k="rev">Porta revers.</th>
        <th data-k="inv">Inverter</th>
        <th data-k="pr">Preço aprox.</th>

      <tbody id="tb"></tbody>

const TL={c2:"Compacta",d:"Duplex",i:"Inverse",s:"Side by Side",f:"French Door"};
const TC={c2:"c2",d:"d",i:"i",s:"s",f:"f"};
function revLabel(v){
  if(v===1)return '<span class="yes">✓ Sim</span>';
  if(v===0)return '<span class="no">Não</span>';
  return '<span class="no">N/A</span>';
}
function invLabel(v){
  if(v===1)return '<span class="yes">✓ Sim</span>';
  if(v===0)return '<span class="no">Não</span>';
  return '<span class="unk">—</span>';
}
let sk="pr",sd=1,fb_="",ft_="",fr_="",fs_="";
function fmtP(v){return"R$ "+v.toLocaleString("pt-BR")}
function render(){
  const rows=D.filter(r=>{
    if(fb_&&r.brand!==fb_)return false;
    if(ft_&&r.type!==ft_)return false;
    if(fr_==="1"&&r.rev!==1)return false;
    if(fr_==="0"&&r.rev!==0)return false;
    if(fs_){const q=fs_.toLowerCase();if(!r.brand.toLowerCase().includes(q)&&!r.model.toLowerCase().includes(q))return false}
    return true;
  }).sort((a,b)=>{
    let av=a[sk],bv=b[sk];
    if(sk==="rev"){av=a.rev;bv=b.rev;}
    if(av==null&&bv==null)return 0;
    if(av==null)return 1;
    if(bv==null)return -1;
    return typeof av==="string"?av.localeCompare(bv)*sd:(av-bv)*sd;
  });
  document.getElementById("ct").textContent=rows.length+" modelo"+(rows.length!==1?"s":"")+" — "+rows.filter(r=>r.rev===1).length+" com porta reversível";
  document.getElementById("tb").innerHTML=rows.map(r=>`<tr>
    <td class="bm">${r.brand}</td>
    <td>${r.model}</td>
    <td class="r">${r.cap}</td>
    <td><span class="badge ${TC[r.type]||r.type}">${TL[r.type]||r.type}</span></td>
    <td class="r">${r.alt}</td>
    <td class="r">${r.lar}</td>
    <td class="r">${r.pro}</td>
    <td class="c">${revLabel(r.rev)}</td>
    <td class="c">${invLabel(r.inv)}</td>
    <td class="price">${fmtP(r.pr)}</td>
  </tr>`).join("");
  document.querySelectorAll("thead th[data-k]").forEach(t=>{
    const a=t.querySelector("span.arr");
    if(a)a.textContent=t.dataset.k===sk?(sd>0?" ↑":" ↓"):"";
  });
}
function init(){
  const brands=[...new Set(D.map(r=>r.brand))].sort();
  const bs=document.getElementById("fb");
  brands.forEach(b=>{const o=document.createElement("option");o.value=b;o.textContent=b;bs.appendChild(o)});
  const types=[...new Set(D.map(r=>r.type))];
  const ts=document.getElementById("ft");
  ["d","i","s","f","c2"].forEach(t=>{if(types.includes(t)){const o=document.createElement("option");o.value=t;o.textContent=TL[t];ts.appendChild(o)}});
  document.querySelectorAll("thead th[data-k]").forEach(th=>{
    const a=document.createElement("span");a.className="arr";th.appendChild(a);
    th.addEventListener("click",()=>{const k=th.dataset.k;sk===k?sd*=-1:(sk=k,sd=1);render()});
  });
  document.getElementById("fb").onchange=e=>{fb_=e.target.value;render()};
  document.getElementById("ft").onchange=e=>{ft_=e.target.value;render()};
  document.getElementById("fr").onchange=e=>{fr_=e.target.value;render()};
  document.getElementById("fs").oninput=e=>{fs_=e.target.value;render()};
  render();
}
